<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foam Wiki</title>
  <meta name="description" content="Personal knowledge base powered by Foam & Docsify">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">

  <!-- Docsify theme: dark -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <style>
    /* ─── Design tokens ─────────────────────────────────────── */
    :root {
      --base-font-family: 'JetBrains Mono', 'Fira Code', monospace;
      --base-font-size: 15px;
      --base-line-height: 1.75;

      --theme-color: #7ee8a2;          /* mint accent */
      --sidebar-width: 280px;
      --sidebar-background: #0d1117;
      --content-background: #0d1117;
      --base-background-color: #0d1117;
      --base-color: #cdd9e5;

      --heading-color: #e6edf3;
      --link-color: #7ee8a2;
      --link-color--hover: #a8f5c0;
      --code-theme-background: #161b22;
      --code-theme-text: #79c0ff;
      --blockquote-background: #161b22;
      --blockquote-color: #8b949e;
      --blockquote-border-color: #30363d;

      --sidebar-nav-link-color: #8b949e;
      --sidebar-nav-link-color--active: #7ee8a2;
      --sidebar-nav-link-background-color--active: #1c2128;
      --sidebar-nav-link-border-color--active: #7ee8a2;
      --sidebar-nav-pagelink-color: #e6edf3;
    }

    /* ─── Google Fonts ──────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap');

    /* ─── Global ────────────────────────────────────────────── */
    * { box-sizing: border-box; }

    body {
      font-family: var(--base-font-family);
      background: var(--base-background-color);
      color: var(--base-color);
    }

    /* ─── Sidebar ───────────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-background);
      border-right: 1px solid #21262d;
      padding-top: 0;
    }

    .sidebar-nav {
      padding: 0 16px 40px;
    }

    /* Wiki title / brand in sidebar */
    .app-name-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 20px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: #e6edf3 !important;
      letter-spacing: -0.02em;
      text-decoration: none;
      border-bottom: 1px solid #21262d;
      margin-bottom: 16px;
    }

    .app-name-link::before {
      content: '🧠';
      font-size: 1.4rem;
    }

    /* Search box */
    .search input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      font-family: var(--base-font-family);
      font-size: 13px;
      padding: 8px 12px;
      width: 100%;
      transition: border-color .2s;
    }

    .search input:focus {
      outline: none;
      border-color: var(--theme-color);
      box-shadow: 0 0 0 3px rgba(126,232,162,.15);
    }

    .search input::placeholder { color: #484f58; }

    /* Nav links */
    .sidebar-nav ul li a {
      font-size: 13px;
      color: var(--sidebar-nav-link-color);
      padding: 5px 12px;
      border-radius: 5px;
      transition: color .15s, background .15s;
      display: block;
    }

    .sidebar-nav ul li a:hover {
      color: #e6edf3;
      background: #161b22;
      text-decoration: none;
    }

    .sidebar-nav ul li.active > a {
      color: var(--theme-color);
      background: rgba(126,232,162,.08);
      font-weight: 600;
    }

    /* Section headings inside sidebar */
    .sidebar-nav ul p {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #484f58;
      padding: 14px 12px 4px;
      margin: 0;
    }

    /* ─── Main content ──────────────────────────────────────── */
    .content {
      max-width: 820px;
    }

    section.cover,
    .markdown-section {
      padding: 40px 48px 60px;
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-family: 'Syne', sans-serif;
      color: var(--heading-color);
      letter-spacing: -0.02em;
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 800;
      border-bottom: 1px solid #21262d;
      padding-bottom: 12px;
    }

    .markdown-section h2 {
      font-size: 1.35rem;
      font-weight: 700;
      border-bottom: 1px solid #21262d;
      padding-bottom: 8px;
      margin-top: 2.2rem;
    }

    .markdown-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #79c0ff;
      margin-top: 1.8rem;
    }

    /* Links */
    .markdown-section a {
      color: var(--link-color);
      text-decoration: none;
      border-bottom: 1px solid rgba(126,232,162,.3);
      transition: border-color .15s, color .15s;
    }

    .markdown-section a:hover {
      color: var(--link-color--hover);
      border-color: var(--link-color--hover);
    }

    /* [[wikilink]] styling via docsify-wikilinks plugin */
    .markdown-section a.wikilink {
      color: #d2a8ff;
      border-color: rgba(210,168,255,.3);
    }

    /* Code */
    .markdown-section code {
      background: #161b22;
      color: #79c0ff;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: .88em;
    }

    .markdown-section pre {
      background: #161b22 !important;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: auto;
    }

    .markdown-section pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: .85rem;
      color: #e6edf3;
    }

    /* Blockquote */
    .markdown-section blockquote {
      background: #161b22;
      border-left: 3px solid var(--theme-color);
      border-radius: 0 6px 6px 0;
      color: #8b949e;
      margin: 1.2rem 0;
      padding: 12px 20px;
    }

    .markdown-section blockquote p { margin: 0; }

    /* Tables */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      font-size: .9rem;
    }

    .markdown-section table th {
      background: #161b22;
      color: #e6edf3;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 10px 14px;
      border: 1px solid #30363d;
    }

    .markdown-section table td {
      padding: 8px 14px;
      border: 1px solid #21262d;
      color: #8b949e;
    }

    .markdown-section table tr:hover td {
      background: #161b22;
      color: #cdd9e5;
    }

    /* Tags (foam-style) */
    .markdown-section .tag,
    .markdown-section span[data-tag] {
      display: inline-block;
      background: rgba(126,232,162,.1);
      color: var(--theme-color);
      border: 1px solid rgba(126,232,162,.3);
      border-radius: 20px;
      font-size: .75rem;
      padding: 2px 10px;
      margin: 2px;
      font-weight: 600;
    }

    /* Callout boxes */
    .markdown-section .tip,
    .markdown-section .warning,
    .markdown-section .danger,
    .markdown-section .note {
      border-radius: 8px;
      padding: 14px 20px;
      margin: 1.2rem 0;
      font-size: .9rem;
    }

    /* ─── Cover page ────────────────────────────────────────── */
    section.cover {
      background: linear-gradient(135deg, #0d1117 0%, #0d1117 60%, #0f1922 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .cover-main {
      text-align: left;
      max-width: 640px;
    }

    section.cover h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      color: #e6edf3;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    section.cover h1 span {
      color: var(--theme-color);
    }

    section.cover p {
      font-size: 1rem;
      color: #8b949e;
      max-width: 480px;
      line-height: 1.7;
    }

    section.cover .cover-main > p:last-child a {
      display: inline-block;
      background: var(--theme-color);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .02em;
      transition: opacity .2s;
      text-decoration: none;
    }

    section.cover .cover-main > p:last-child a:hover { opacity: .85; }

    /* ─── Navbar ────────────────────────────────────────────── */
    .app-nav {
      background: rgba(13,17,23,.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #21262d;
    }

    .app-nav a {
      color: #8b949e;
      font-size: 13px;
      font-family: var(--base-font-family);
      transition: color .15s;
    }

    .app-nav a:hover { color: #e6edf3; }

    /* ─── Backlinks section (custom) ────────────────────────── */
    .backlinks-section {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #21262d;
    }

    .backlinks-section h4 {
      font-family: 'Syne', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #484f58;
      margin: 0 0 12px;
    }

    .backlinks-section a {
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      color: #79c0ff !important;
      border-radius: 5px;
      padding: 4px 12px;
      font-size: .82rem;
      margin: 3px;
      transition: border-color .15s;
    }

    .backlinks-section a:hover {
      border-color: #79c0ff;
    }

    /* ─── Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* ─── Progress bar ──────────────────────────────────────── */
    #nprogress .bar { background: var(--theme-color) !important; height: 2px; }
    #nprogress .peg  { box-shadow: 0 0 10px var(--theme-color), 0 0 5px var(--theme-color); }

    /* ─── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .markdown-section { padding: 24px 20px 40px; }
    }
  </style>
</head>
<body>

  <!-- ── Docsify config ──────────────────────────────────────── -->
  <script>
    window.$docsify = {
      name: 'Foam Wiki',
      nameLink: '/',

      repo: '',               // optional: 'https://github.com/you/your-foam-repo'

      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      coverpage: '_coverpage.md',
      onlyCover: false,

      auto2top: true,
      autoHeader: false,

      maxLevel: 4,
      subMaxLevel: 3,

      homepage: 'README.md',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search notes…',
        noData: 'No results.',
        depth: 6,
        hideOtherSidebarContent: false,
      },

      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },

      /* Foam wikilinks: [[Note Title]] → /note-title */
      wikilinks: {
        pattern: /\[\[(.+?)\]\]/g,
        transform: (slug) =>
          '#/' + slug.toLowerCase().replace(/\s+/g, '-'),
      },

      plugins: [
        /* Inject backlinks placeholder after each page renders */
        function(hook) {
          hook.afterEach(function(html) {
            return html + `
              <div class="backlinks-section" id="backlinks">
                <h4>🔗 Backlinks</h4>
                <span style="color:#484f58;font-size:.82rem;">
                  (Populate via Foam VS Code extension or a build step)
                </span>
              </div>`;
          });
        }
      ],

      /* Mermaid diagrams */
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return `<div class="mermaid">${code}</div>`;
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>

  <!-- ── Docsify core ────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- ── Plugins ────────────────────────────────────────────── -->
  <!-- Full-text search -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Pagination (prev / next) -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- Copy-to-clipboard on code blocks -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- Emoji shortcodes :tada: -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>

  <!-- Mermaid diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
  <script>
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.doneEach(function() {
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
    });
  </script>

  <!-- External link target _blank -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-external-link@1/dist/docsify-external-link.min.js"></script>

  <!-- NProgress bar -->
  <script src="https://cdn.jsdelivr.net/npm/nprogress/nprogress.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nprogress/nprogress.css">

</body>
</html>
