<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Foam Knowledge Graph</title>
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(8px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #f97316;
      box-shadow: 0 0 10px #f97316aa;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px #f97316aa; }
      50% { box-shadow: 0 0 20px #f97316cc, 0 0 40px #f9731644; }
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e2e8f0;
    }

    .stats {
      display: flex;
      gap: 1.5rem;
      font-size: 0.7rem;
      color: #64748b;
    }

    .stat span {
      color: #94a3b8;
      margin-left: 0.3rem;
    }

    #foam-graph {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(15,15,25,0.95);
      border: 1px solid rgba(249,115,22,0.4);
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      font-size: 0.72rem;
      color: #e2e8f0;
      pointer-events: none;
      display: none;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      max-width: 200px;
    }

    #tooltip .node-id {
      font-weight: 600;
      color: #f97316;
      margin-bottom: 0.25rem;
    }

    #tooltip .node-meta {
      color: #64748b;
      font-size: 0.65rem;
    }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      background: rgba(10,10,15,0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.65rem;
      color: #64748b;
      backdrop-filter: blur(8px);
    }

    #legend .legend-title {
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.6rem;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Controls */
    #controls {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .ctrl-btn {
      width: 32px; height: 32px;
      background: rgba(15,15,25,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #94a3b8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .ctrl-btn:hover {
      background: rgba(249,115,22,0.15);
      border-color: rgba(249,115,22,0.4);
      color: #f97316;
    }

    /* Error state */
    #error-msg {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 20;
      background: rgba(10,10,15,0.95);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 2rem 2.5rem;
    }

    #error-msg .err-title {
      color: #ef4444;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    #error-msg .err-path {
      color: #64748b;
      font-size: 0.65rem;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo-dot"></div>
      <h1>Foam Knowledge Graph</h1>
    </div>
    <div class="stats" id="stats">
      <div class="stat">nodes <span id="stat-nodes">—</span></div>
      <div class="stat">edges <span id="stat-edges">—</span></div>
      <div class="stat">hub <span id="stat-hub">—</span></div>
    </div>
  </header>

  <div id="foam-graph">
    <div id="error-msg">
      <div class="err-title">⚠ graph.json not found</div>
      <div class="err-path" id="err-path"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="node-id" id="tip-id"></div>
    <div class="node-meta" id="tip-meta"></div>
  </div>

  <div id="legend">
    <div class="legend-title">Connectivity</div>
    <div class="legend-row"><div class="legend-dot" style="background:#fde047;box-shadow:0 0 6px #fde04766"></div> isolated (1 edge)</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f97316;box-shadow:0 0 6px #f9731666"></div> connected (2–3 edges)</div>
    <div class="legend-row"><div class="legend-dot" style="background:#a855f7;box-shadow:0 0 6px #a855f766"></div> hub (4+ edges)</div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-fit" title="Fit to screen">⊡</button>
    <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in">+</button>
    <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out">−</button>
  </div>

<script>
  const graphPath = new URL('./graph.json', window.location.href).href;
  const tooltip = document.getElementById('tooltip');

  fetch(graphPath)
    .then(res => {
      if (!res.ok) throw new Error(graphPath);
      return res.json();
    })
    .then(data => {
      // --- Degree map ---
      const degreeMap = {};
      data.forEach(el => {
        if (el.data.source && el.data.target) {
          degreeMap[el.data.source] = (degreeMap[el.data.source] || 0) + 1;
          degreeMap[el.data.target] = (degreeMap[el.data.target] || 0) + 1;
        }
      });

      // --- Stats ---
      const nodes = data.filter(e => !e.data.source);
      const edges = data.filter(e => e.data.source);
      const hubNode = Object.entries(degreeMap).sort((a,b) => b[1]-a[1])[0];
      document.getElementById('stat-nodes').textContent = nodes.length;
      document.getElementById('stat-edges').textContent = edges.length;
      document.getElementById('stat-hub').textContent = hubNode ? hubNode[0] : '—';

      // --- Color by degree ---
      function nodeColor(id) {
        const d = degreeMap[id] || 0;
        if (d >= 4) return '#a855f7';
        if (d >= 2) return '#f97316';
        return '#fde047';
      }

      function nodeGlow(id) {
        const d = degreeMap[id] || 0;
        if (d >= 4) return '#a855f7';
        if (d >= 2) return '#f97316';
        return '#fde047';
      }

      // --- Cytoscape ---
      const cy = cytoscape({
        container: document.getElementById('foam-graph'),
        elements: data,
        style: [
          {
            selector: 'node',
            style: {
              'label': 'data(label)',
              'background-color': ele => nodeColor(ele.id()),
              'color': '#0a0a0f',
              'text-valign': 'center',
              'text-halign': 'center',
              'font-family': 'JetBrains Mono, monospace',
              'font-size': ele => {
                const d = degreeMap[ele.id()] || 0;
                return Math.max(9, 10 + d * 1.2) + 'px';
              },
              'font-weight': '600',
              'width': ele => Math.max(28, 22 + (degreeMap[ele.id()] || 0) * 12),
              'height': ele => Math.max(28, 22 + (degreeMap[ele.id()] || 0) * 12),
              'border-width': 0,
              'shadow-blur': 20,
              'shadow-color': ele => nodeGlow(ele.id()),
              'shadow-opacity': 0.6,
              'shadow-offset-x': 0,
              'shadow-offset-y': 0,
              'transition-property': 'background-color, shadow-blur, shadow-opacity, width, height',
              'transition-duration': '0.2s'
            }
          },
          {
            selector: 'node:selected',
            style: {
              'background-color': '#38bdf8',
              'shadow-color': '#38bdf8',
              'shadow-blur': 30,
              'shadow-opacity': 0.8,
              'color': '#0a0a0f'
            }
          },
          {
            selector: 'node.hover',
            style: {
              'shadow-blur': 35,
              'shadow-opacity': 0.9
            }
          },
          {
            selector: 'edge',
            style: {
              'line-color': 'rgba(148,163,184,0.2)',
              'width': 1.2,
              'curve-style': 'bezier',
              'opacity': 0.7,
              'transition-property': 'line-color, opacity',
              'transition-duration': '0.2s'
            }
          },
          {
            selector: 'edge.highlighted',
            style: {
              'line-color': 'rgba(249,115,22,0.6)',
              'width': 2,
              'opacity': 1
            }
          },
          {
            selector: '.faded',
            style: {
              'opacity': 0.15
            }
          }
        ],
        layout: {
          name: 'concentric',
          minNodeSpacing: 60,
          levelWidth: () => 2,
          concentric: node => degreeMap[node.id()] || 0,
          padding: 60,
          animate: true,
          animationDuration: 600,
          animationEasing: 'ease-out-cubic'
        },
        wheelSensitivity: 0.3,
        minZoom: 0.2,
        maxZoom: 4
      });

      // --- Hover interactions ---
      cy.on('mouseover', 'node', evt => {
        const node = evt.target;
        const id = node.id();
        const deg = degreeMap[id] || 0;

        node.addClass('hover');

        // Highlight connected edges & neighbors
        cy.elements().addClass('faded');
        node.removeClass('faded');
        node.connectedEdges().removeClass('faded').addClass('highlighted');
        node.neighborhood('node').removeClass('faded');

        // Show tooltip
        const pos = evt.renderedPosition;
        const containerRect = document.getElementById('foam-graph').getBoundingClientRect();
        tooltip.style.display = 'block';
        tooltip.style.left = (containerRect.left + pos.x + 14) + 'px';
        tooltip.style.top  = (containerRect.top  + pos.y - 14) + 'px';
        document.getElementById('tip-id').textContent = id;
        document.getElementById('tip-meta').textContent =
          `${deg} connection${deg !== 1 ? 's' : ''} · click to open`;
      });

      cy.on('mouseout', 'node', evt => {
        evt.target.removeClass('hover');
        cy.elements().removeClass('faded highlighted');
        tooltip.style.display = 'none';
      });

      cy.on('mousemove', 'node', evt => {
        const pos = evt.renderedPosition;
        const containerRect = document.getElementById('foam-graph').getBoundingClientRect();
        tooltip.style.left = (containerRect.left + pos.x + 14) + 'px';
        tooltip.style.top  = (containerRect.top  + pos.y - 14) + 'px';
      });

      // --- Click to navigate ---
      cy.on('tap', 'node', evt => {
        const id = evt.target.id();
        window.open(`/${id}.md`, '_blank');
      });

      // --- Control buttons ---
      document.getElementById('btn-fit').addEventListener('click', () => cy.fit(undefined, 40));
      document.getElementById('btn-zoom-in').addEventListener('click', () => cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } }));
      document.getElementById('btn-zoom-out').addEventListener('click', () => cy.zoom({ level: cy.zoom() * 0.75, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } }));
    })
    .catch(err => {
      document.getElementById('err-path').textContent = 'Could not load: ' + err.message;
      document.getElementById('error-msg').style.display = 'block';
    });
</script>
</body>
</html>
